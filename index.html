<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adega Vieira</title>
    
    <!-- Link para o arquivo Manifest separado -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffb300">
    
    <!-- Configurações Apple/iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Adega Vieira">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            --bg-principal: #121214;
            --bg-card: #1a1a1e;
            --bg-input: #26262b;
            --cor-primaria: #ffb300;
            --cor-erro: #e53935;
            --cor-sucesso: #43a047;
            --cor-azul: #00b0ff;
            --texto-principal: #ffffff;
            --texto-secundario: #a4a4a8;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            margin: 0;
            padding: 8px;
            color: var(--texto-principal);
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid #2d2d34;
        }

        .topo-app {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 10px 0 20px 0;
        }
        .logo-foto {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid var(--cor-primaria);
            object-fit: cover;
        }
        h1 {
            color: var(--cor-primaria);
            margin: 0;
            font-size: 24px;
            letter-spacing: 0.5px;
        }
        
        .abas {
            display: flex;
            background: var(--bg-input);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 15px;
            gap: 4px;
        }
        .aba-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: var(--texto-secundario);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .aba-btn.ativa {
            background: var(--cor-primaria);
            color: #121214;
        }

        .conteudo-aba { display: none; }
        .conteudo-aba.ativa { display: block; }

        .menu-precos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }
        .preco-tag {
            text-align: center;
            font-weight: bold;
            font-size: 0.9em;
            background: rgba(255, 179, 0, 0.1);
            border: 1px solid var(--cor-primaria);
            color: var(--cor-primaria);
            padding: 10px;
            border-radius: 8px;
        }
        .preco-tag.bud {
            background: rgba(229, 57, 53, 0.1);
            border: 1px solid var(--cor-erro);
            color: var(--cor-erro);
        }

        .form-grupo {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid #3d3d45;
            border-radius: 8px;
            font-size: 16px;
            color: white;
            outline: none;
        }
        
        button {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .btn-sucesso { 
            background-color: var(--cor-sucesso); 
            color: white;
            padding: 12px 16px;
            font-size: 16px;
        }
        .btn-pagar { 
            background: linear-gradient(135deg, #43a047, #2e7d32);
            color: white;
            font-size: 14px; 
            padding: 12px;
            width: 100%;
            margin-top: 12px;
            border-radius: 8px;
        }

        .cliente-card {
            background: #222227;
            border: 1px solid #2d2d34;
            margin-bottom: 15px;
            border-radius: 12px;
            padding: 14px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d34;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .nome { font-weight: bold; font-size: 1.2em; color: #fff; }
        .btn-excluir { background: transparent; color: var(--cor-erro); font-size: 18px; padding: 4px 8px; }

        .produto-linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }
        .prod-info { font-size: 0.95em; color: var(--texto-secundario); }
        .prod-info strong { color: #fff; }
        .botoes-qtd { display: flex; gap: 6px; }
        .btn-control { width: 38px; height: 38px; font-size: 18px; color: white; }
        .btn-control.sub { background-color: #3d3d45; color: var(--cor-erro); }
        .btn-control.add { background-color: var(--cor-azul); }

        .resumo-card {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #3d3d45;
            display: flex;
            justify-content: space-between;
            font-size: 1em;
        }

        .dash-card {
            background: linear-gradient(135deg, #1e251f, #141a15);
            border: 1px solid var(--cor-sucesso);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mini-card {
            background: var(--bg-input);
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #2d2d34;
        }
        .mini-card h3 { margin: 0; font-size: 12px; color: var(--texto-secundario); text-transform: uppercase; }
        .mini-card p { margin: 6px 0 0 0; font-size: 14px; font-weight: bold; color: #fff; }

        .tabela-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #2d2d34;
            background: var(--bg-input);
        }
        .tabela-historico { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tabela-historico th, .tabela-historico td { padding: 12px 10px; border-bottom: 1px solid #2d2d34; text-align: left; }
        .tabela-historico th { background: #2d2d34; color: var(--texto-secundario); }
        .status-pago { color: var(--cor-sucesso); font-weight: bold; }

        .btn-zerar {
            display: block;
            width: 100%;
            background-color: #2d2d34;
            color: #ff5252;
            margin-top: 25px;
            padding: 14px;
            font-size: 14px;
            border: 1px solid rgba(255, 82, 82, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="topo-app">
        <!-- Puxando a foto direto do repositório local -->
        <img class="logo-foto" src="logo.png" alt="Logo">
        <h1>Adega Vieira</h1>
    </div>
    
    <div class="abas">
        <button class="aba-btn ativa" onclick="mudarAba('balcao')">🛒 Balcão (Jogo)</button>
        <button class="aba-btn" onclick="mudarAba('dashboard')">📊 Dashboard</button>
    </div>

    <!-- ABA 1: BALCÃO -->
    <div id="aba-balcao" class="conteudo-aba ativa">
        <div class="menu-precos">
            <div class="preco-tag">Brahma: R$ 3,50</div>
            <div class="preco-tag bud">Budweiser: R$ 4,50</div>
        </div>

        <div class="form-grupo">
            <input type="text" id="nomeCliente" placeholder="Nome de quem chegou..." autocomplete="off">
            <button class="btn-sucesso" onclick="adicionarCliente()">Adicionar</button>
        </div>

        <div class="lista-clientes" id="listaClientes"></div>
    </div>

    <!-- ABA 2: DASHBOARD -->
    <div id="aba-dashboard" class="conteudo-aba">
        <div class="dash-card">
            <h2 style="margin:0 0 6px 0; color: var(--texto-secundario); font-size: 14px; text-transform: uppercase;">Faturamento Total (Dia)</h2>
            <div id="faturamentoTotal" style="font-size: 32px; font-weight: bold; color: var(--cor-sucesso);">R$ 0,00</div>
        </div>

        <div class="dash-grid">
            <div class="mini-card">
                <h3>Estoque Vendido</h3>
                <p id="dashCervejas" style="color: var(--cor-primaria);">Brahma: 0 <br> Bud: 0</p>
            </div>
            <div class="mini-card" style="border-color: rgba(225, 55, 55, 0.3);">
                <h3>Ainda a Receber</h3>
                <p id="dashDevedores" style="color: var(--cor-erro); font-size: 16px;">R$ 0,00</p>
            </div>
        </div>

        <h2 style="font-size: 15px; margin: 20px 0 10px 0; color: var(--texto-secundario);">Histórico de Contas Fechadas</h2>
        <div class="tabela-container">
            <table class="tabela-historico">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Consumo</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historicoVendas"></tbody>
            </table>
        </div>

        <button class="btn-zerar" onclick="zerarTudo()">Zerar Caixa / Próximo Jogo</button>
    </div>
</div>

<script>
    // Registro do Service Worker obrigatório para o PWA instalar de verdade
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker ativo!"))
        .catch(err => console.log("Erro no SW:", err));
    }

    const PRECO_BRAHMA = 3.50;
    const PRECO_BUD = 4.50;
    
    let clientes = JSON.parse(localStorage.getItem('adega_clientes_v3')) || [];
    let historico = JSON.parse(localStorage.getItem('adega_historico_v3')) || [];

    function salvarDados() {
        localStorage.setItem('adega_clientes_v3', JSON.stringify(clientes));
        localStorage.setItem('adega_historico_v3', JSON.stringify(historico));
        renderizar();
    }

    function mudarAba(aba) {
        document.querySelectorAll('.aba-btn').forEach(btn => btn.classList.remove('ativa'));
        document.querySelectorAll('.conteudo-aba').forEach(c => c.classList.remove('ativa'));

        if(aba === 'balcao') {
            document.querySelectorAll('.aba-btn')[0].classList.add('ativa');
            document.getElementById('aba-balcao').classList.add('ativa');
        } else {
            document.querySelectorAll('.aba-btn')[1].classList.add('ativa');
            document.getElementById('aba-dashboard').classList.add('ativa');
        }
    }

    function adicionarCliente() {
        const input = document.getElementById('nomeCliente');
        const nome = input.value.trim();
        if (nome === "") { alert("Digite o nome da pessoa!"); return; }
        clientes.push({ nome: nome, brahma: 0, bud: 0 });
        input.value = "";
        salvarDados();
    }

    function lancarItem(index, marca, valor) {
        const cliente = clientes[index];
        const nomeMarca = marca === 'brahma' ? 'Brahma' : 'Budweiser';
        if(valor === -1 && cliente[marca] === 0) return;

        if(confirm(`Confirmar ${valor > 0 ? '+1' : '-1'} ${nomeMarca} para ${cliente.nome}?`)) {
            cliente[marca] += valor;
            salvarDados();
        }
    }

    function finalizarPagamento(index) {
        const cliente = clientes[index];
        if (cliente.brahma === 0 && cliente.bud === 0) { alert("Nenhuma bebida consumida!"); return; }

        const totalDevido = (cliente.brahma * PRECO_BRAHMA) + (cliente.bud * PRECO_BUD);
        let resumoConsumo = `${cliente.brahma > 0 ? cliente.brahma + ' Brahma ' : ''}${cliente.bud > 0 ? cliente.bud + ' Bud' : ''}`;

        if (confirm(`Confirmar que ${cliente.nome} PAGOU R$ ${totalDevido.toFixed(2).replace('.', ',')}?\nConsumo: ${resumoConsumo}`)) {
            historico.push({ nome: cliente.nome, brahma: cliente.brahma, bud: cliente.bud, total: totalDevido, status: 'Pago' });
            clientes.splice(index, 1);
            salvarDados();
        }
    }

    function removerCliente(index) {
        if (confirm(`Excluir ${clientes[index].nome} da lista?`)) {
            clientes.splice(index, 1);
            salvarDados();
        }
    }

    function zerarTudo() {
        if (confirm("Deseja limpar todo o Dashboard e reiniciar o caixa?")) {
            clientes = []; historico = []; salvarDados();
        }
    }

    function renderizar() {
        const listaHtml = document.getElementById('listaClientes');
        listaHtml.innerHTML = "";
        let totalDevedoresGeral = 0, brahmaAtivas = 0, budAtivas = 0;

        clientes.forEach((cliente, index) => {
            const totalCliente = (cliente.brahma * PRECO_BRAHMA) + (cliente.bud * PRECO_BUD);
            totalDevedoresGeral += totalCliente; brahmaAtivas += cliente.brahma; budAtivas += cliente.bud;

            listaHtml.innerHTML += `
                <div class="cliente-card">
                    <div class="card-header">
                        <span class="nome">${cliente.nome}</span>
                        <button class="btn-excluir" onclick="removerCliente(${index})">✕</button>
                    </div>
                    <div class="produto-linha">
                        <span class="prod-info">Brahma: <strong>${cliente.brahma} un</strong></span>
                        <div class="botoes-qtd">
                            <button class="btn-control sub" onclick="lancarItem(${index}, 'brahma', -1)">-</button>
                            <button class="btn-control add" onclick="lancarItem(${index}, 'brahma', 1)">+</button>
                        </div>
                    </div>
                    <div class="produto-linha">
                        <span class="prod-info">Budweiser: <strong>${cliente.bud} un</strong></span>
                        <div class="botoes-qtd">
                            <button class="btn-control sub" onclick="lancarItem(${index}, 'bud', -1)">-</button>
                            <button class="btn-control add" onclick="lancarItem(${index}, 'bud', 1)">+</button>
                        </div>
                    </div>
                    <div class="resumo-card">
                        <span>Total Parcial:</span>
                        <span style="color:var(--cor-primaria); font-weight:bold;">R$ ${totalCliente.toFixed(2).replace('.', ',')}</span>
                    </div>
                    <button class="btn-pagar" onclick="finalizarPagamento(${index})">💰 CONFIRMAR RECEBIMENTO</button>
                </div>`;
        });

        let brahmaPagas = 0, budPagas = 0, faturamentoPago = 0;
        const historicoHtml = document.getElementById('historicoVendas');
        historicoHtml.innerHTML = "";

        historico.forEach(item => {
            brahmaPagas += item.brahma; budPagas += item.bud; faturamentoPago += item.total;
            let detalhesH = [];
            if(item.brahma > 0) detalhesH.push(`${item.brahma} Br`);
            if(item.bud > 0) detalhesH.push(`${item.bud} Bd`);

            historicoHtml.innerHTML += `
                <tr>
                    <td><strong>${item.nome}</strong></td>
                    <td>${detalhesH.join(' / ') || '0'}</td>
                    <td>R$ ${item.total.toFixed(2).replace('.', ',')}</td>
                    <td class="status-pago">${item.status}</td>
                </tr>`;
        });

        document.getElementById('faturamentoTotal').innerText = `R$ ${(faturamentoPago + totalDevedoresGeral).toFixed(2).replace('.', ',')}`;
        document.getElementById('dashCervejas').innerHTML = `Brahma: ${brahmaPagas + brahmaAtivas} <br> Budweiser: ${budPagas + budAtivas}`;
        document.getElementById('dashDevedores').innerText = `R$ ${totalDevedoresGeral.toFixed(2).replace('.', ',')}`;
    }

    renderizar();
</script>
</body>
</html>
