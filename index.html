<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adega Vieira</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffb300">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Adega Vieira">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-principal: #121214;
            --bg-card: #1a1a1e;
            --bg-input: #26262b;
            --cor-primaria: #ffb300;
            --cor-erro: #e53935;
            --cor-sucesso: #43a047;
            --cor-azul: #00b0ff;
            --texto-principal: #ffffff;
            --texto-secundario: #a4a4a8;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            margin: 0;
            padding: 8px;
            color: var(--texto-principal);
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid #2d2d34;
        }

        .topo-app {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 10px 0 20px 0;
        }
        .logo-foto {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid var(--cor-primaria);
            object-fit: cover;
        }
        h1 {
            color: var(--cor-primaria);
            margin: 0;
            font-size: 24px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .status-conexao {
            text-align: center;
            font-size: 11px;
            color: var(--texto-secundario);
            margin-top: -8px;
            margin-bottom: 14px;
        }
        .status-conexao.erro { color: var(--cor-erro); font-weight: bold; }
        .status-conexao.ok { color: var(--cor-sucesso); }

        .abas {
            display: flex;
            background: var(--bg-input);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 15px;
            gap: 4px;
        }
        .aba-btn {
            flex: 1;
            padding: 10px 4px;
            background: transparent;
            color: var(--texto-secundario);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12.5px;
            cursor: pointer;
        }
        .aba-btn.ativa {
            background: var(--cor-primaria);
            color: #121214;
        }

        .conteudo-aba { display: none; }
        .conteudo-aba.ativa { display: block; }

        .menu-precos {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }
        .preco-tag {
            text-align: center;
            font-weight: bold;
            font-size: 0.8em;
            background: rgba(255, 179, 0, 0.1);
            border: 1px solid var(--cor-primaria);
            color: var(--cor-primaria);
            padding: 8px 10px;
            border-radius: 8px;
            flex: 1 1 auto;
        }
        .sem-produtos {
            font-size: 13px;
            color: var(--texto-secundario);
            text-align: center;
            padding: 10px;
        }

        .form-grupo {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            margin-bottom: 15px;
        }
        .form-grupo-produto {
            display: grid;
            grid-template-columns: 1fr 90px auto;
            gap: 8px;
            margin-bottom: 15px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid #3d3d45;
            border-radius: 8px;
            font-size: 16px;
            color: white;
            outline: none;
        }

        button {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sucesso {
            background-color: var(--cor-sucesso);
            color: white;
            padding: 12px 16px;
            font-size: 16px;
        }
        .btn-pagar {
            background: linear-gradient(135deg, #43a047, #2e7d32);
            color: white;
            font-size: 14px;
            padding: 12px;
            width: 100%;
            margin-top: 12px;
            border-radius: 8px;
        }

        .cliente-card, .produto-card {
            background: #222227;
            border: 1px solid #2d2d34;
            margin-bottom: 15px;
            border-radius: 12px;
            padding: 14px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d34;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .nome { font-weight: bold; font-size: 1.2em; color: #fff; }
        .btn-excluir { background: transparent; color: var(--cor-erro); font-size: 18px; padding: 4px 8px; }

        .produto-linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }
        .prod-info { font-size: 0.95em; color: var(--texto-secundario); }
        .prod-info strong { color: #fff; }
        .botoes-qtd { display: flex; gap: 6px; align-items: center; }
        .qtd-num { min-width: 18px; text-align: center; font-weight: bold; color: #fff; }
        .btn-control { width: 34px; height: 34px; font-size: 18px; color: white; }
        .btn-control.sub { background-color: #3d3d45; color: var(--cor-erro); }
        .btn-control.add { background-color: var(--cor-azul); }

        .resumo-card {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #3d3d45;
            display: flex;
            justify-content: space-between;
            font-size: 1em;
        }

        .produto-card { display: flex; justify-content: space-between; align-items: center; }
        .produto-card .info { font-size: 15px; }
        .produto-card .info .p-nome { font-weight: bold; color: #fff; }
        .produto-card .info .p-preco { color: var(--cor-primaria); font-weight: bold; }
        .produto-card .acoes { display: flex; gap: 6px; }
        .btn-mini { padding: 8px 10px; font-size: 13px; background: var(--bg-input); color: #fff; }

        .dash-card {
            background: linear-gradient(135deg, #1e251f, #141a15);
            border: 1px solid var(--cor-sucesso);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mini-card {
            background: var(--bg-input);
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #2d2d34;
        }
        .mini-card h3 { margin: 0; font-size: 12px; color: var(--texto-secundario); text-transform: uppercase; }
        .mini-card p { margin: 6px 0 0 0; font-size: 13px; font-weight: bold; color: #fff; line-height: 1.4; }

        .filtro-data {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }
        .filtro-data button {
            flex: 1;
            padding: 8px;
            font-size: 12.5px;
            background: var(--bg-input);
            color: var(--texto-secundario);
        }
        .filtro-data button.ativa { background: var(--cor-primaria); color: #121214; }

        .tabela-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #2d2d34;
            background: var(--bg-input);
        }
        .tabela-historico { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tabela-historico th, .tabela-historico td { padding: 12px 10px; border-bottom: 1px solid #2d2d34; text-align: left; }
        .tabela-historico th { background: #2d2d34; color: var(--texto-secundario); }
        .status-pago { color: var(--cor-sucesso); font-weight: bold; }

        .vazio { text-align: center; color: var(--texto-secundario); font-size: 13px; padding: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="topo-app">
        <img class="logo-foto" src="logo.png" alt="Logo">
        <h1>Adega Vieira</h1>
    </div>
    <div id="statusConexao" class="status-conexao">Conectando...</div>

    <div class="abas">
        <button class="aba-btn ativa" onclick="mudarAba('balcao')">🛒 Caixa</button>
        <button class="aba-btn" onclick="mudarAba('produtos')">📦 Produtos</button>
        <button class="aba-btn" onclick="mudarAba('dashboard')">📊 Dashboard</button>
    </div>

    <!-- ABA 1: CAIXA / BALCÃO -->
    <div id="aba-balcao" class="conteudo-aba ativa">
        <div class="menu-precos" id="menuPrecos"></div>

        <div class="form-grupo">
            <input type="text" id="nomeCliente" placeholder="Nome de quem chegou..." autocomplete="off">
            <button class="btn-sucesso" onclick="adicionarCliente()">Adicionar</button>
        </div>

        <div class="lista-clientes" id="listaClientes"></div>
    </div>

    <!-- ABA 2: PRODUTOS -->
    <div id="aba-produtos" class="conteudo-aba">
        <div class="form-grupo-produto">
            <input type="text" id="nomeProduto" placeholder="Nome do produto" autocomplete="off">
            <input type="number" id="precoProduto" placeholder="R$" step="0.01" min="0">
            <button class="btn-sucesso" onclick="adicionarProduto()">+</button>
        </div>
        <div id="listaProdutos"></div>
    </div>

    <!-- ABA 3: DASHBOARD -->
    <div id="aba-dashboard" class="conteudo-aba">
        <div class="filtro-data">
            <button class="ativa" id="filtroHoje" onclick="mudarFiltroData('hoje')">Hoje</button>
            <button id="filtroTudo" onclick="mudarFiltroData('tudo')">Tudo</button>
        </div>

        <div class="dash-card">
            <h2 style="margin:0 0 6px 0; color: var(--texto-secundario); font-size: 14px; text-transform: uppercase;">Faturamento</h2>
            <div id="faturamentoTotal" style="font-size: 32px; font-weight: bold; color: var(--cor-sucesso);">R$ 0,00</div>
        </div>

        <div class="dash-grid">
            <div class="mini-card">
                <h3>Vendido por produto</h3>
                <p id="dashProdutos" style="color: var(--cor-primaria); text-align: left; padding-left: 5px;">-</p>
            </div>
            <div class="mini-card" style="border-color: rgba(225, 55, 55, 0.3); display: flex; flex-direction: column; justify-content: center;">
                <h3>Ainda a Receber</h3>
                <p id="dashDevedores" style="color: var(--cor-erro); font-size: 18px;">R$ 0,00</p>
            </div>
        </div>

        <h2 style="font-size: 15px; margin: 20px 0 10px 0; color: var(--texto-secundario);">Histórico de Contas Fechadas</h2>
        <div class="tabela-container">
            <table class="tabela-historico">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Consumo</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historicoVendas"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('se.js')
        .then(() => console.log("Service Worker ativo!"))
        .catch(err => console.log("Erro no SW:", err));
    }

    // ======= CONFIGURAÇÃO DO BANCO (SUPABASE) =======
    // Troque pelos dados do SEU projeto Supabase (Settings > API).
    const SUPABASE_URL = "https://bwmjkacaclynjqwjrfqe.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_LPkzXmErvM0mroUVxH5EFQ_7IdmNpk9";
    // ==================================================

    let db = null;
    let conectado = false;
    try {
        if (!SUPABASE_URL.startsWith("COLOQUE_AQUI") && !SUPABASE_ANON_KEY.startsWith("COLOQUE_AQUI")) {
            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            conectado = true;
        }
    } catch (e) { console.error(e); }

    let produtos = [];      // {id, nome, preco, ativo}
    let comandas = [];      // {id, nome, status, total, criado_em, fechado_em, comanda_itens: [{produto_id, produto_nome, preco_unit, quantidade}]}
    let filtroData = 'hoje';

    const elStatus = document.getElementById('statusConexao');

    function setStatus(texto, classe) {
        elStatus.textContent = texto;
        elStatus.className = 'status-conexao ' + (classe || '');
    }

    async function init() {
        if (!conectado) {
            setStatus('⚠️ Banco de dados não configurado. Veja as instruções no README.', 'erro');
            return;
        }
        setStatus('Sincronizando...', '');
        await carregarDados();
        setStatus('Conectado ✓', 'ok');

        // Mantém tudo sincronizado em tempo real entre aparelhos diferentes
        db.channel('adega-realtime')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'produtos' }, carregarDados)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'comandas' }, carregarDados)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'comanda_itens' }, carregarDados)
            .subscribe();
    }

    async function carregarDados() {
        const { data: prods, error: e1 } = await db.from('produtos').select('*').order('nome');
        if (e1) { setStatus('Erro ao carregar produtos: ' + e1.message, 'erro'); return; }
        produtos = prods || [];

        const { data: coms, error: e2 } = await db
            .from('comandas')
            .select('*, comanda_itens(*)')
            .order('criado_em', { ascending: true });
        if (e2) { setStatus('Erro ao carregar comandas: ' + e2.message, 'erro'); return; }
        comandas = coms || [];

        renderizar();
    }

    function precisaConexao() {
        if (!conectado) { alert('Configure o banco de dados primeiro (veja o README).'); return true; }
        return false;
    }

    function mudarAba(aba) {
        document.querySelectorAll('.aba-btn').forEach(btn => btn.classList.remove('ativa'));
        document.querySelectorAll('.conteudo-aba').forEach(c => c.classList.remove('ativa'));
        const abas = ['balcao', 'produtos', 'dashboard'];
        const idx = abas.indexOf(aba);
        document.querySelectorAll('.aba-btn')[idx].classList.add('ativa');
        document.getElementById('aba-' + aba).classList.add('ativa');
    }

    function mudarFiltroData(f) {
        filtroData = f;
        document.getElementById('filtroHoje').classList.toggle('ativa', f === 'hoje');
        document.getElementById('filtroTudo').classList.toggle('ativa', f === 'tudo');
        renderizar();
    }

    // ---------- PRODUTOS ----------
    async function adicionarProduto() {
        if (precisaConexao()) return;
        const nomeEl = document.getElementById('nomeProduto');
        const precoEl = document.getElementById('precoProduto');
        const nome = nomeEl.value.trim();
        const preco = parseFloat(precoEl.value);
        if (!nome) { alert('Digite o nome do produto!'); return; }
        if (isNaN(preco) || preco < 0) { alert('Digite um preço válido!'); return; }

        const { error } = await db.from('produtos').insert({ nome, preco, ativo: true });
        if (error) { alert('Erro ao salvar produto: ' + error.message); return; }
        nomeEl.value = ''; precoEl.value = '';
        await carregarDados();
    }

    async function editarProduto(id) {
        const produto = produtos.find(p => p.id === id);
        if (!produto) return;
        const novoNome = prompt('Nome do produto:', produto.nome);
        if (novoNome === null) return;
        const novoPrecoStr = prompt('Preço (R$):', produto.preco);
        if (novoPrecoStr === null) return;
        const novoPreco = parseFloat(novoPrecoStr.replace(',', '.'));
        if (!novoNome.trim() || isNaN(novoPreco) || novoPreco < 0) { alert('Dados inválidos!'); return; }

        const { error } = await db.from('produtos')
            .update({ nome: novoNome.trim(), preco: novoPreco })
            .eq('id', id);
        if (error) { alert('Erro ao editar: ' + error.message); return; }
        await carregarDados();
    }

    async function removerProduto(id) {
        if (!confirm('Remover este produto da lista de vendas? (o histórico é mantido)')) return;
        // Soft delete: mantém o produto no histórico, só some do cadastro ativo
        const { error } = await db.from('produtos').update({ ativo: false }).eq('id', id);
        if (error) { alert('Erro ao remover: ' + error.message); return; }
        await carregarDados();
    }

    // ---------- CAIXA / COMANDAS ----------
    async function adicionarCliente() {
        if (precisaConexao()) return;
        const input = document.getElementById('nomeCliente');
        const nome = input.value.trim();
        if (nome === "") { alert("Digite o nome da pessoa!"); return; }

        const { error } = await db.from('comandas').insert({ nome, status: 'aberta', total: 0 });
        if (error) { alert('Erro ao adicionar cliente: ' + error.message); return; }
        input.value = "";
        await carregarDados();
    }

    function qtdAtual(comanda, produtoId) {
        const item = comanda.comanda_itens.find(i => i.produto_id === produtoId);
        return item ? item.quantidade : 0;
    }

    async function lancarItem(comandaId, produtoId, delta) {
        const comanda = comandas.find(c => c.id === comandaId);
        const produto = produtos.find(p => p.id === produtoId);
        if (!comanda || !produto) return;
        const atual = qtdAtual(comanda, produto.id);
        const novaQtd = atual + delta;
        if (novaQtd < 0) return;

        if (!confirm(`Confirmar ${delta > 0 ? '+1' : '-1'} ${produto.nome} para ${comanda.nome}?`)) return;

        const itemExistente = comanda.comanda_itens.find(i => i.produto_id === produto.id);
        let error;
        if (itemExistente) {
            ({ error } = await db.from('comanda_itens')
                .update({ quantidade: novaQtd })
                .eq('id', itemExistente.id));
        } else {
            ({ error } = await db.from('comanda_itens').insert({
                comanda_id: comandaId,
                produto_id: produto.id,
                produto_nome: produto.nome,
                preco_unit: produto.preco,
                quantidade: novaQtd
            }));
        }
        if (error) { alert('Erro ao lançar item: ' + error.message); return; }
        await carregarDados();
    }

    function totalComanda(comanda) {
        return comanda.comanda_itens.reduce((soma, i) => soma + (i.quantidade * i.preco_unit), 0);
    }

    async function finalizarPagamento(comandaId) {
        const comanda = comandas.find(c => c.id === comandaId);
        const total = totalComanda(comanda);
        if (total === 0) { alert('Nenhum item consumido!'); return; }

        const resumo = comanda.comanda_itens
            .filter(i => i.quantidade > 0)
            .map(i => `${i.quantidade} ${i.produto_nome}`)
            .join(' / ');

        if (!confirm(`Confirmar que ${comanda.nome} PAGOU R$ ${total.toFixed(2).replace('.', ',')}?\nConsumo: ${resumo}`)) return;

        const { error } = await db.from('comandas')
            .update({ status: 'paga', total, fechado_em: new Date().toISOString() })
            .eq('id', comandaId);
        if (error) { alert('Erro ao finalizar: ' + error.message); return; }
        await carregarDados();
    }

    async function removerCliente(comandaId) {
        const comanda = comandas.find(c => c.id === comandaId);
        if (!confirm(`Excluir ${comanda.nome} da lista? (isso apaga o consumo em aberto dele)`)) return;
        const { error } = await db.from('comandas').delete().eq('id', comandaId);
        if (error) { alert('Erro ao excluir: ' + error.message); return; }
        await carregarDados();
    }

    // ---------- RENDERIZAÇÃO ----------
    function ehHoje(dataIso) {
        if (!dataIso) return false;
        const d = new Date(dataIso);
        const hoje = new Date();
        return d.getFullYear() === hoje.getFullYear() && d.getMonth() === hoje.getMonth() && d.getDate() === hoje.getDate();
    }

    function renderizar() {
        renderizarProdutos();
        renderizarBalcao();
        renderizarDashboard();
    }

    function renderizarProdutos() {
        const el = document.getElementById('listaProdutos');
        const ativos = produtos.filter(p => p.ativo);
        if (ativos.length === 0) {
            el.innerHTML = '<div class="vazio">Nenhum produto cadastrado ainda.</div>';
            return;
        }
        el.innerHTML = ativos.map(p => `
            <div class="produto-card">
                <div class="info">
                    <div class="p-nome">${p.nome}</div>
                    <div class="p-preco">R$ ${p.preco.toFixed(2).replace('.', ',')}</div>
                </div>
                <div class="acoes">
                    <button class="btn-mini" onclick="editarProduto('${p.id}')">✎ Editar</button>
                    <button class="btn-mini" style="color: var(--cor-erro);" onclick="removerProduto('${p.id}')">✕ Remover</button>
                </div>
            </div>`).join('');
    }

    function renderizarBalcao() {
        const menuPrecos = document.getElementById('menuPrecos');
        const ativos = produtos.filter(p => p.ativo);
        if (ativos.length === 0) {
            menuPrecos.innerHTML = '<div class="sem-produtos">Cadastre produtos na aba "Produtos" para começar a vender.</div>';
        } else {
            menuPrecos.innerHTML = ativos.map(p =>
                `<div class="preco-tag">${p.nome}:<br>R$ ${p.preco.toFixed(2).replace('.', ',')}</div>`
            ).join('');
        }

        const listaHtml = document.getElementById('listaClientes');
        const abertas = comandas.filter(c => c.status === 'aberta');
        if (abertas.length === 0) {
            listaHtml.innerHTML = '<div class="vazio">Ninguém na comanda no momento.</div>';
            return;
        }

        listaHtml.innerHTML = abertas.map(comanda => {
            const linhas = ativos.map(p => {
                const qtd = qtdAtual(comanda, p.id);
                return `
                    <div class="produto-linha">
                        <span class="prod-info">${p.nome}: <strong>${qtd} un</strong></span>
                        <div class="botoes-qtd">
                            <button class="btn-control sub" onclick="lancarItem('${comanda.id}', '${p.id}', -1)">-</button>
                            <button class="btn-control add" onclick="lancarItem('${comanda.id}', '${p.id}', 1)">+</button>
                        </div>
                    </div>`;
            }).join('');

            const total = totalComanda(comanda);

            return `
                <div class="cliente-card">
                    <div class="card-header">
                        <span class="nome">${comanda.nome}</span>
                        <button class="btn-excluir" onclick="removerCliente('${comanda.id}')">✕</button>
                    </div>
                    ${linhas || '<div class="sem-produtos">Nenhum produto cadastrado.</div>'}
                    <div class="resumo-card">
                        <span>Total Parcial:</span>
                        <span style="color:var(--cor-primaria); font-weight:bold;">R$ ${total.toFixed(2).replace('.', ',')}</span>
                    </div>
                    <button class="btn-pagar" onclick="finalizarPagamento('${comanda.id}')">💰 CONFIRMAR RECEBIMENTO</button>
                </div>`;
        }).join('');
    }

    function renderizarDashboard() {
        const abertas = comandas.filter(c => c.status === 'aberta');
        let pagas = comandas.filter(c => c.status === 'paga');
        if (filtroData === 'hoje') pagas = pagas.filter(c => ehHoje(c.fechado_em));

        const totalDevedores = abertas.reduce((soma, c) => soma + totalComanda(c), 0);
        const faturamentoPago = pagas.reduce((soma, c) => soma + Number(c.total), 0);

        // soma por produto (dos itens já pagos no período filtrado)
        const vendidoPorProduto = {};
        pagas.forEach(c => {
            (c.comanda_itens || []).forEach(i => {
                vendidoPorProduto[i.produto_nome] = (vendidoPorProduto[i.produto_nome] || 0) + i.quantidade;
            });
        });

        document.getElementById('faturamentoTotal').innerText = `R$ ${(faturamentoPago + totalDevedores).toFixed(2).replace('.', ',')}`;
        document.getElementById('dashDevedores').innerText = `R$ ${totalDevedores.toFixed(2).replace('.', ',')}`;

        const dashProdutosEl = document.getElementById('dashProdutos');
        const entradas = Object.entries(vendidoPorProduto);
        dashProdutosEl.innerHTML = entradas.length > 0
            ? entradas.map(([nome, qtd]) => `${nome}: ${qtd}`).join('<br>')
            : 'Nenhuma venda ainda';

        const historicoHtml = document.getElementById('historicoVendas');
        if (pagas.length === 0) {
            historicoHtml.innerHTML = '<tr><td colspan="4" class="vazio">Sem contas fechadas neste período.</td></tr>';
        } else {
            historicoHtml.innerHTML = pagas.slice().reverse().map(c => {
                const detalhes = (c.comanda_itens || [])
                    .filter(i => i.quantidade > 0)
                    .map(i => `${i.quantidade} ${i.produto_nome}`)
                    .join(' / ') || '0';
                return `
                    <tr>
                        <td><strong>${c.nome}</strong></td>
                        <td>${detalhes}</td>
                        <td>R$ ${Number(c.total).toFixed(2).replace('.', ',')}</td>
                        <td class="status-pago">Pago</td>
                    </tr>`;
            }).join('');
        }
    }

    init();
</script>
</body>
</html>
