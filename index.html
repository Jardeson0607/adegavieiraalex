<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adega Vieira</title>
    
    <!-- Configurações para funcionar como Aplicativo de Celular (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Adega Vieira">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/761/761767.png">
    
    <!-- Manifesto básico embutido para Android reconhecer como App Instalável -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"Adega Vieira","short_name":"Adega Vieira","start_url":".","display":"standalone","background_color":"#121214","theme_color":"#ffb300","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/761/761767.png","sizes":"512x512","type":"image/png"}]}' />

    <style>
        :root {
            --bg-principal: #121214;
            --bg-card: #1a1a1e;
            --bg-input: #26262b;
            --cor-primaria: #ffb300; /* Dourado Cerveja */
            --cor-erro: #e53935;
            --cor-sucesso: #43a047;
            --cor-azul: #00b0ff;
            --texto-principal: #ffffff;
            --texto-secundario: #a4a4a8;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            margin: 0;
            padding: 12px;
            color: var(--texto-principal);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid #2d2d34;
        }

        h1 {
            text-align: center;
            color: var(--cor-primaria);
            margin: 5px 0 15px 0;
            font-size: 26px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Botão de Instalar App no topo */
        #btnInstalar {
            display: none;
            width: 100%;
            background: linear-gradient(135deg, var(--cor-primaria), #ff8f00);
            color: #121214;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 12px rgba(255, 179, 0, 0.3);
        }
        
        .abas {
            display: flex;
            background: var(--bg-input);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .aba-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: var(--texto-secundario);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .aba-btn.ativa {
            background: var(--cor-primaria);
            color: #121214;
            box-shadow: 0 4px 10px rgba(255, 179, 0, 0.2);
        }

        .conteudo-aba {
            display: none;
        }
        .conteudo-aba.ativa {
            display: block;
        }

        .menu-precos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .preco-tag {
            text-align: center;
            font-weight: bold;
            font-size: 0.95em;
            background: rgba(255, 179, 0, 0.1);
            border: 1px solid var(--cor-primaria);
            color: var(--cor-primaria);
            padding: 12px;
            border-radius: 8px;
        }
        .preco-tag.bud {
            background: rgba(229, 57, 53, 0.1);
            border: 1px solid var(--cor-erro);
            color: var(--cor-erro);
        }

        .form-grupo {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px;
            background: var(--bg-input);
            border: 1px solid #3d3d45;
            border-radius: 8px;
            font-size: 16px;
            color: white;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: var(--cor-primaria);
        }
        
        button {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s, transform 0.1s;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.97);
        }
        .btn-sucesso { 
            background-color: var(--cor-sucesso); 
            color: white;
            padding: 14px 20px;
            font-size: 16px;
        }
        .btn-pagar { 
            background: linear-gradient(135deg, #43a047, #2e7d32);
            color: white;
            font-size: 13px; 
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
        }

        .lista-clientes { margin-top: 10px; }
        .cliente-card {
            background: #222227;
            border: 1px solid #2d2d34;
            margin-bottom: 12px;
            border-radius: 10px;
            padding: 14px;
        }
        .card-topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .info { flex: 1; min-width: 0; }
        .nome {
            font-weight: bold;
            font-size: 1.15em;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .detalhes {
            font-size: 0.9em;
            color: var(--texto-secundario);
            margin-top: 6px;
            line-height: 1.4;
        }
        .acoes { display: flex; gap: 8px; flex-shrink: 0; }
        
        .btn-sub { background-color: var(--cor-erro); width: 44px; height: 44px; font-size: 20px; color: white; }
        .btn-add { background-color: var(--cor-azul); width: 44px; height: 44px; font-size: 20px; color: white; }
        .btn-remover { background-color: #3d3d45; width: 38px; height: 44px; font-size: 14px; color: #ff5252; }

        .dash-card {
            background: linear-gradient(135deg, #1e251f, #141a15);
            border: 1px solid var(--cor-sucesso);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
        }
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mini-card {
            background: var(--bg-input);
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #2d2d34;
        }
        .mini-card.devedores {
            border-color: rgba(225, 55, 55, 0.3);
        }
        .mini-card h3 { margin: 0; font-size: 12px; color: var(--texto-secundario); text-transform: uppercase; }
        .mini-card p { margin: 6px 0 0 0; font-size: 15px; font-weight: bold; color: #fff; }

        .tabela-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #2d2d34;
            background: var(--bg-input);
        }
        .tabela-historico {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .tabela-historico th, .tabela-historico td {
            padding: 12px 10px;
            border-bottom: 1px solid #2d2d34;
        }
        .tabela-historico th { background: #2d2d34; color: var(--texto-secundario); }
        .status-pago { color: var(--cor-sucesso); font-weight: bold; }

        .btn-zerar {
            display: block;
            width: 100%;
            background-color: #2d2d34;
            color: #ff5252;
            margin-top: 25px;
            padding: 14px;
            font-size: 14px;
            border: 1px solid rgba(255, 82, 82, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <button id="btnInstalar" onclick="instalarApp()">📲 BAIXAR APLICATIVO ADEGA VIEIRA</button>

    <h1>Adega Vieira 🍻</h1>
    
    <div class="abas">
        <button class="aba-btn ativa" onclick="mudarAba('balcao')">🛒 Balcão (Jogo)</button>
        <button class="aba-btn" onclick="mudarAba('dashboard')">📊 Dashboard</button>
    </div>

    <!-- ABA 1: BALCÃO -->
    <div id="aba-balcao" class="conteudo-aba ativa">
        <div class="menu-precos">
            <div class="preco-tag">Brahma: R$ 3,50</div>
            <div class="preco-tag bud">Budweiser: R$ 4,50</div>
        </div>

        <div class="form-grupo">
            <input type="text" id="nomeCliente" placeholder="Nome de quem chegou..." autocomplete="off">
            <button class="btn-sucesso" onclick="adicionarCliente()">Adicionar</button>
        </div>

        <div class="lista-clientes" id="listaClientes"></div>
    </div>

    <!-- ABA 2: DASHBOARD -->
    <div id="aba-dashboard" class="conteudo-aba">
        <div class="dash-card">
            <h2 style="margin:0 0 6px 0; color: var(--texto-secundario); font-size: 14px; text-transform: uppercase;">Faturamento Total (Dia)</h2>
            <div id="faturamentoTotal" style="font-size: 32px; font-weight: bold; color: var(--cor-sucesso);">R$ 0,00</div>
        </div>

        <div class="dash-grid">
            <div class="mini-card">
                <h3>Estoque Vendido</h3>
                <p id="dashCervejas" style="color: var(--cor-primaria);">Brahma: 0 <br> Bud: 0</p>
            </div>
            <div class="mini-card devedores">
                <h3>Ainda a Receber</h3>
                <p id="dashDevedores" style="color: var(--cor-erro); padding-top: 8px; font-size: 18px;">R$ 0,00</p>
            </div>
        </div>

        <h2 style="font-size: 15px; margin: 20px 0 10px 0; color: var(--texto-secundario);">Histórico de Contas Fechadas</h2>
        <div class="tabela-container">
            <table class="tabela-historico">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Consumo</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historicoVendas"></tbody>
            </table>
        </div>

        <button class="btn-zerar" onclick="zerarTudo()">Zerar Caixa / Próximo Jogo</button>
    </div>
</div>

<script>
    const PRECO_BRAHMA = 3.50;
    const PRECO_BUD = 4.50;
    
    let clientes = JSON.parse(localStorage.getItem('adega_clientes_v2')) || [];
    let historico = JSON.parse(localStorage.getItem('adega_historico_v2')) || [];
    let defferredPrompt;

    // Código para gerenciar instalação do aplicativo
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        defferredPrompt = e;
        document.getElementById('btnInstalar').style.display = 'block';
    });

    function instalarApp() {
        if (defferredPrompt) {
            defferredPrompt.prompt();
            defferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    document.getElementById('btnInstalar').style.display = 'none';
                }
                defferredPrompt = null;
            });
        }
    }

    function salvarDados() {
        localStorage.setItem('adega_clientes_v2', JSON.stringify(clientes));
        localStorage.setItem('adega_historico_v2', JSON.stringify(historico));
        renderizar();
    }

    function mudarAba(aba) {
        document.querySelectorAll('.aba-btn').forEach(btn => btn.classList.remove('ativa'));
        document.querySelectorAll('.conteudo-aba').forEach(c => c.classList.remove('ativa'));

        if(aba === 'balcao') {
            document.querySelectorAll('.aba-btn')[0].classList.add('ativa');
            document.getElementById('aba-balcao').classList.add('ativa');
        } else {
            document.querySelectorAll('.aba-btn')[1].classList.add('ativa');
            document.getElementById('aba-dashboard').classList.add('ativa');
        }
    }

    function adicionarCliente() {
        const input = document.getElementById('nomeCliente');
        const nome = input.value.trim();
        if (nome === "") { alert("Digite o nome da pessoa!"); return; }
        clientes.push({ nome: nome, brahma: 0, bud: 0 });
        input.value = "";
        salvarDados();
    }

    function determinarMarcaEValor(valor, cliente) {
        let tipo = prompt(`Digite 1 para Brahma ou 2 para Budweiser para aplicar (${valor > 0 ? '+1' : '-1'}):\n\n1 - Brahma (R$ 3,50)\n2 - Budweiser (R$ 4,50)`);
        if (tipo !== "1" && tipo !== "2") {
            if (tipo !== null) alert("Opção inválida! Digite apenas 1 ou 2.");
            return null;
        }
        let marca = tipo === "1" ? "brahma" : "bud";
        let nomeMarca = tipo === "1" ? "Brahma" : "Budweiser";

        if (valor === -1 && cliente[marca] === 0) {
            alert(`Este cliente não tem ${nomeMarca} registrada.`);
            return null;
        }
        return { marca, nomeMarca };
    }

    function alterarQtd(index, valor) {
        const cliente = clientes[index];
        const resultadoSelecao = determinarMarcaEValor(valor, cliente);
        if (!resultadoSelecao) return;

        let mensagem = valor === 1 ? `Confirmar +1 ${resultadoSelecao.nomeMarca} para ${cliente.nome}?` : `Confirmar -1 ${resultadoSelecao.nomeMarca} para ${cliente.nome}?`;

        if (confirm(mensagem)) {
            cliente[resultadoSelecao.marca] += valor;
            salvarDados();
        }
    }

    function finalizarPagamento(index) {
        const cliente = clientes[index];
        if (cliente.brahma === 0 && cliente.bud === 0) { alert("Essa pessoa não consumiu nada ainda!"); return; }

        const totalDevido = (cliente.brahma * PRECO_BRAHMA) + (cliente.bud * PRECO_BUD);
        let resumoConsumo = `${cliente.brahma > 0 ? cliente.brahma + ' Brahma ' : ''}${cliente.bud > 0 ? cliente.bud + ' Bud' : ''}`;

        if (confirm(`Confirmar que ${cliente.nome} PAGOU R$ ${totalDevido.toFixed(2).replace('.', ',')}?\nConsumo: ${resumoConsumo}`)) {
            historico.push({ nome: cliente.nome, brahma: cliente.brahma, bud: cliente.bud, total: totalDevido, status: 'Pago' });
            clientes.splice(index, 1);
            salvarDados();
        }
    }

    function removerCliente(index) {
        if (confirm(`Remover ${clientes[index].nome} sem computar o caixa?`)) {
            clientes.splice(index, 1);
            salvarDados();
        }
    }

    function zerarTudo() {
        if (confirm("Deseja limpar todo o Dashboard e reiniciar o caixa para outro dia?")) {
            clientes = []; historico = []; salvarDados();
        }
    }

    function renderizar() {
        const listaHtml = document.getElementById('listaClientes');
        listaHtml.innerHTML = "";
        let totalDevedoresGeral = 0, brahmaAtivas = 0, budAtivas = 0;

        clientes.forEach((cliente, index) => {
            const totalCliente = (cliente.brahma * PRECO_BRAHMA) + (cliente.bud * PRECO_BUD);
            totalDevedoresGeral += totalCliente; brahmaAtivas += cliente.brahma; budAtivas += cliente.bud;

            let textoDetalhes = [];
            if(cliente.brahma > 0) textoDetalhes.push(`${cliente.brahma} Brahma`);
            if(cliente.bud > 0) textoDetalhes.push(`${cliente.bud} Bud`);
            let stringConsumo = textoDetalhes.length > 0 ? textoDetalhes.join(' / ') : 'Nenhuma';

            listaHtml.innerHTML += `
                <div class="cliente-card">
                    <div class="card-topo">
                        <div class="info">
                            <div class="nome">${cliente.nome}</div>
                            <div class="detalhes">Consumo: <span style="color:#fff;">${stringConsumo}</span><br>Parcial: <span style="color:var(--cor-primaria); font-weight:bold;">R$ ${totalCliente.toFixed(2).replace('.', ',')}</span></div>
                        </div>
                        <div class="acoes">
                            <button class="btn-sub" onclick="alterarQtd(${index}, -1)">-</button>
                            <button class="btn-add" onclick="alterarQtd(${index}, 1)">+</button>
                            <button class="btn-remover" onclick="removerCliente(${index})">×</button>
                        </div>
                    </div>
                    <button class="btn-pagar" onclick="finalizarPagamento(${index})">💰 CONFIRMAR RECEBIMENTO</button>
                </div>`;
        });

        let brahmaPagas = 0, budPagas = 0, faturamentoPago = 0;
        const historicoHtml = document.getElementById('historicoVendas');
        historicoHtml.innerHTML = "";

        historico.forEach(item => {
            brahmaPagas += item.brahma; budPagas += item.bud; faturamentoPago += item.total;
            let detalhesH = [];
            if(item.brahma > 0) detalhesH.push(`${item.brahma} Br`);
            if(item.bud > 0) detalhesH.push(`${item.bud} Bd`);

            historicoHtml.innerHTML += `
                <tr>
                    <td><strong>${item.nome}</strong></td>
                    <td>${detalhesH.join(' / ') || '0'}</td>
                    <td>R$ ${item.total.toFixed(2).replace('.', ',')}</td>
                    <td class="status-pago">${item.status}</td>
                </tr>`;
        });

        document.getElementById('faturamentoTotal').innerText = `R$ ${(faturamentoPago + totalDevedoresGeral).toFixed(2).replace('.', ',')}`;
        document.getElementById('dashCervejas').innerHTML = `Brahma: ${brahmaPagas + brahmaAtivas} <br> Budweiser: ${budPagas + budAtivas}`;
        document.getElementById('dashDevedores').innerText = `R$ ${totalDevedoresGeral.toFixed(2).replace('.', ',')}`;
    }

    renderizar();
</script>

</body>
</html>
